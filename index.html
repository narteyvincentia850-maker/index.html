<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainCoins</title>
</head>
<body style="background:#050510;color:white;font-family:sans-serif;text-align:center;padding:40px">

<h1>🧠 BrainCoins</h1>
<p>Answer questions. Earn coins.</p>

<select id="category">
  <option value="">Select Category</option>
  <option>Science</option>
  <option>History</option>
  <option>Sports</option>
</select>

<select id="difficulty">
  <option value="">Select Difficulty</option>
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<br><br>

<button onclick="startGame()">Start</button>

<div id="game" style="margin-top:30px;display:none">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<script>
let category, difficulty;

function startGame(){
  category = document.getElementById("category").value;
  difficulty = document.getElementById("difficulty").value;

  if(!category || !difficulty){
    alert("Select category and difficulty");
    return;
  }

  document.getElementById("game").style.display = "block";
  loadQuestion();
}

async function loadQuestion(){
  document.getElementById("question").innerText = "Loading...";
  document.getElementById("options").innerHTML = "";

  try{
    const res = await fetch('/api/question', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category, difficulty })
    });

    const data = await res.json();

    document.getElementById("question").innerText = data.question;

    data.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.style.display = "block";
      btn.style.margin = "10px auto";
      btn.onclick = () => checkAnswer(i, data.correct);
      document.getElementById("options").appendChild(btn);
    });

  }catch(e){
    alert("Error loading question");
  }
}

function checkAnswer(i, correct){
  if(i === correct){
    alert("Correct! +coins");
  }else{
    alert("Wrong!");
  }
}
</script>

</body>
</html>
