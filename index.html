<script>
// No API Key needed! Uses OpenTDB (Free Public Trivia Database)
var coins = +localStorage.getItem('bc_coins') || 0, 
    games = +localStorage.getItem('bc_games') || 0, 
    streak = 0, cat = null, diff = null, curQ = 0, score = 0, earned = 0, q = null, done = false, timer = 20, tint = null;

const catMap = {
  'Science': 17, 'History': 23, 'Pop Culture': 11, 'Geography': 22, 'Sports': 21, 'Technology': 18
};

// Function to fix weird characters like &quot; and &#039;
function decodeHTML(html) {
    var txt = document.createElement("textarea");
    txt.innerHTML = html;
    return txt.value;
}

function upd(){document.getElementById('coins').textContent=coins.toLocaleString()}
function pick(el,c){document.querySelectorAll('.cat').forEach(function(b){b.classList.remove('on')});el.classList.add('on');cat=c;chk();}
function pickD(el,d){document.querySelectorAll('.diff').forEach(function(b){b.classList.remove('on')});el.classList.add('on');diff=d;chk();}
function chk(){var b=document.getElementById('startBtn');if(cat&&diff){b.disabled=false;b.textContent='START GAME →';}}

async function start(){score=0;earned=0;curQ=0;streak=0;show('quiz');await loadQ();}

async function loadQ(){
  done=false; clearInterval(tint);
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('qwrap').classList.add('hidden');
  document.getElementById('qnum').textContent='Q'+(curQ+1)+'/5';
  
  q = await getQ();
  
  document.getElementById('loading').classList.add('hidden');
  if(!q){alert('Error fetching question. Try again!'); goHome(); return;}
  
  document.getElementById('qtxt').textContent = decodeHTML(q.question);
  var o=document.getElementById('opts'); o.innerHTML='';
  
  q.options.forEach(function(opt,i){
    var b=document.createElement('button');
    b.className='opt';
    b.textContent = ['A','B','C','D'][i]+'. ' + decodeHTML(opt);
    b.onclick=function(){answer(i,b)};
    o.appendChild(b);
  });
  
  document.getElementById('qwrap').classList.remove('hidden');
  startTimer();
}

async function getQ(){
  try {
    const categoryId = catMap[cat];
    const url = `https://opentdb.com/api.php?amount=1&category=${categoryId}&difficulty=${diff}&type=multiple`;
    const response = await fetch(url);
    const data = await response.json();
    if(data.response_code !== 0) return null;
    const res = data.results[0];
    const options = [...res.incorrect_answers];
    const correctIndex = Math.floor(Math.random() * 4);
    options.splice(correctIndex, 0, res.correct_answer);
    return { question: res.question, options: options, correct: correctIndex };
  } catch(e) { console.error(e); return null; }
}

function startTimer(){timer=20;updT();tint=setInterval(function(){timer--;updT();if(timer<=0){clearInterval(tint);timeout();}},1000);}
function updT(){var p=(timer/20)*100;var c=timer>10?'#00f5ff':timer>5?'#facc15':'#f87171';document.getElementById('tbar').style.width=p+'%';document.getElementById('tbar').style.background=c;document.getElementById('tsec').textContent=timer+'s';}

function answer(i,btn){
  if(done) return; done=true; clearInterval(tint);
  if(i===q.correct){
    var r={easy:10,medium:25,hard:50}[diff];
    var tot=r + (streak>=2 ? Math.floor(r*0.5) : 0);
    score++; earned+=tot; coins+=tot; streak++;
    localStorage.setItem('bc_coins',coins);
    btn.classList.add('correct');
  } else {
    streak=0; btn.classList.add('wrong'); revealAns();
  }
  upd(); setTimeout(next,1800);
}

function revealAns(){document.querySelectorAll('.opt')[q.correct].classList.add('show');}
function next(){curQ++;if(curQ>=5)showResults();else loadQ();}

function showResults(){
  games++; localStorage.setItem('bc_games',games);
  var e=['🏆','⭐','😊','💪','📚','🎯'][5-score]||'🎯';
  var t=['PERFECT!','EXCELLENT!','GREAT!','GOOD!','KEEP TRYING!','TRY AGAIN!'][5-score]||'DONE!';
  document.getElementById('remoji').textContent=e;
  document.getElementById('rtitle').textContent=t;
  document.getElementById('rsub').textContent=cat+' · '+diff.toUpperCase();
  document.getElementById('rearned').textContent=earned;
  document.getElementById('rscore').textContent=score+'/5 correct · Total: '+coins.toLocaleString()+' 🪙';
  show('results');
  upd();
}

// NEW: Share Function
function shareScore() {
    const text = `🧠 I just earned 🪙 ${earned} BrainCoins playing ${cat} trivia! My total is now ${coins.toLocaleString()} 🪙. Can you beat my score? \n\nPlay here: ${window.location.href}`;
    if (navigator.share) {
        navigator.share({ title: 'BrainCoins', text: text, url: window.location.href });
    } else {
        // Fallback for desktop browsers
        const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(whatsappUrl, '_blank');
    }
}

function goHome(){show('home');upd();}
function show(s){['home','quiz','results'].forEach(function(id){document.getElementById(id).classList[id===s?'remove':'add']('hidden');});}
upd();
       </script>
