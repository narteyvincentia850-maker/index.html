<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainCoins</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7492752781940826"
     crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:sans-serif;padding:16px;min-height:100vh}
h1{text-align:center;color:#00f5ff;font-size:24px;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:13px;margin-bottom:16px}
.wallet{text-align:center;color:gold;font-size:18px;margin-bottom:16px}
.card{background:#111;border:1px solid #333;border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{color:#a855f7;font-size:13px;margin-bottom:8px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #444;background:#000;color:#fff;font-size:14px;margin-bottom:8px}
button{width:100%;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:6px}
.btn-main{background:linear-gradient(135deg,#7c3aed,#0891b2);color:#fff}
.btn-green{background:#065f46;color:#4ade80;border:1px solid #4ade80}
.btn-gray{background:#1a1a2e;color:#888;border:1px solid #333}
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.cat{padding:10px 4px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;cursor:pointer;text-align:center;font-size:12px}
.cat.on{border-color:#a855f7;background:#2d1b69;color:#a855f7}
.diffs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.diff{padding:10px 4px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;cursor:pointer;text-align:center;font-size:12px}
.diff.on{border-color:#facc15;color:#facc15;background:#1a1500}
.opt{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;cursor:pointer;text-align:left;font-size:15px;margin-bottom:8px}
.opt.correct{border-color:#4ade80;background:#052e16;color:#4ade80}
.opt.wrong{border-color:#f87171;background:#2d0a0a;color:#f87171}
.opt.show{border-color:#4ade80;color:#4ade80}
.timer{height:6px;background:#333;border-radius:3px;margin-bottom:16px}
.timer-bar{height:100%;border-radius:3px;background:#00f5ff;transition:width 1s linear}
.hidden{display:none}
.earned{text-align:center;color:gold;font-size:32px;font-weight:bold;margin:8px 0}
</style>
</head>
<body>
<h1>🧠 BRAINCOINS</h1>
<div class="sub">Answer questions · Earn coins</div>
<div class="wallet">🪙 <span id="coins">0</span></div>
<div class="card" id="setup">
  <h3>🔑 ENTER YOUR GROQ API KEY</h3>
  <input id="keyInput" type="text" placeholder="Paste your gsk_... key here">
  <button class="btn-green" onclick="saveKey()">SAVE KEY</button>
  <div id="keyMsg" class="hidden" style="color:#4ade80;text-align:center;font-size:13px">✓ Key saved! Scroll down to play.</div>
</div>
<div id="home">
  <div class="card">
    <h3>PICK CATEGORY</h3>
    <div class="cats">
      <div class="cat" onclick="pick(this,'Science')">🔬 Science</div>
      <div class="cat" onclick="pick(this,'History')">📜 History</div>
      <div class="cat" onclick="pick(this,'Pop Culture')">🎬 Pop Culture</div>
      <div class="cat" onclick="pick(this,'Geography')">🌍 Geography</div>
      <div class="cat" onclick="pick(this,'Sports')">⚽ Sports</div>
      <div class="cat" onclick="pick(this,'Technology')">💻 Technology</div>
    </div>
    <h3>PICK DIFFICULTY</h3>
    <div class="diffs">
      <div class="diff" onclick="pickD(this,'easy')">EASY +10🪙</div>
      <div class="diff" onclick="pickD(this,'medium')">MED +25🪙</div>
      <div class="diff" onclick="pickD(this,'hard')">HARD +50🪙</div>
    </div>
    <button class="btn-main" id="startBtn" onclick="start()" disabled>SELECT ABOVE</button>
  </div>
</div>
<div id="quiz" class="hidden">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span id="qnum" style="color:#888;font-size:13px">Q1/5</span>
    <span id="tsec" style="color:#00f5ff;font-size:13px;font-weight:bold">20s</span>
  </div>
  <div class="timer"><div class="timer-bar" id="tbar" style="width:100%"></div></div>
  <div id="loading" style="text-align:center;padding:40px;color:#888">Generating question...</div>
  <div id="qwrap" class="hidden">
    <div class="card"><p id="qtxt" style="font-size:17px;line-height:1.5"></p></div>
    <div id="opts"></div>
  </div>
</div>
<div id="results" class="hidden">
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin:12px 0" id="remoji">🏆</div>
    <div style="font-size:20px;font-weight:bold;color:gold;margin-bottom:4px" id="rtitle">GREAT!</div>
    <div style="color:#888;margin-bottom:16px" id="rsub"></div>
    <div style="color:#888;font-size:12px">COINS EARNED</div>
    <div class="earned">🪙 <span id="rearned">0</span></div>
    <div style="color:#888;margin-top:8px" id="rscore"></div>
  </div>
  <button class="btn-main" onclick="start()">PLAY AGAIN</button>
  <button class="btn-gray" onclick="goHome()" style="margin-top:6px">CHANGE SETTINGS</button>
</div>
<script>
var coins=+localStorage.getItem('bc_coins')||0,games=+localStorage.getItem('bc_games')||0,streak=0,cat=null,diff=null,curQ=0,score=0,earned=0,q=null,done=false,timer=20,tint=null;
function upd(){document.getElementById('coins').textContent=coins.toLocaleString()}
function saveKey(){
  var k=document.getElementById('keyInput').value.trim();
  if(k.length<10){alert('Please paste your full API key!');return;}
  localStorage.setItem('bc_key',k);
  document.getElementById('keyMsg').classList.remove('hidden');
  setTimeout(function(){document.getElementById('setup').classList.add('hidden')},2000);
}
function checkKey(){if(localStorage.getItem('bc_key'))document.getElementById('setup').classList.add('hidden');}
function pick(el,c){document.querySelectorAll('.cat').forEach(function(b){b.classList.remove('on')});el.classList.add('on');cat=c;chk();}
function pickD(el,d){document.querySelectorAll('.diff').forEach(function(b){b.classList.remove('on')});el.classList.add('on');diff=d;chk();}
function chk(){var b=document.getElementById('startBtn');if(cat&&diff){b.disabled=false;b.textContent='START GAME →';}}
async function start(){score=0;earned=0;curQ=0;streak=0;show('quiz');await loadQ();}
async function loadQ(){
  done=false;clearInterval(tint);
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('qwrap').classList.add('hidden');
  document.getElementById('qnum').textContent='Q'+(curQ+1)+'/5';
  q=await getQ();
  document.getElementById('loading').classList.add('hidden');
  if(!q){alert('Error! Check your API key.');goHome();return;}
  document.getElementById('qtxt').textContent=q.question;
  var o=document.getElementById('opts');o.innerHTML='';
  q.options.forEach(function(opt,i){var b=document.createElement('button');b.className='opt';b.textContent=['A','B','C','D'][i]+'. '+opt;b.onclick=function(){answer(i,b)};o.appendChild(b);});
  document.getElementById('qwrap').classList.remove('hidden');
  startTimer();
}
function startTimer(){timer=20;updT();tint=setInterval(function(){timer--;updT();if(timer<=0){clearInterval(tint);timeout();}},1000);}
function updT(){var p=(timer/20)*100;var c=timer>10?'#00f5ff':timer>5?'#facc15':'#f87171';document.getElementById('tbar').style.width=p+'%';document.getElementById('tbar').style.background=c;document.getElementById('tsec').textContent=timer+'s';document.getElementById('tsec').style.color=c;}
function timeout(){if(done)return;done=true;streak=0;revealAns();setTimeout(next,1800);}
function answer(i,btn){
  if(done)return;done=true;clearInterval(tint);
  if(i===q.correct){var r={easy:10,medium:25,hard:50}[diff];var bon=streak>=2?Math.floor(r*0.5):0;var tot=r+bon;score++;earned+=tot;coins+=tot;streak++;localStorage.setItem('bc_coins',coins);btn.classList.add('correct');}
  else{streak=0;btn.classList.add('wrong');revealAns();}
  upd();setTimeout(next,1800);
}
function revealAns(){document.querySelectorAll('.opt')[q.correct].classList.add('show');}
function next(){curQ++;if(curQ>=5)showResults();else loadQ();}
function showResults(){games++;localStorage.setItem('bc_games',games);var e=['🏆','⭐','😊','💪','📚','🎯'][5-score]||'🎯';var t=['PERFECT!','EXCELLENT!','GREAT!','GOOD!','KEEP TRYING!','TRY AGAIN!'][5-score]||'DONE!';document.getElementById('remoji').textContent=e;document.getElementById('rtitle').textContent=t;document.getElementById('rsub').textContent=cat+' · '+diff.toUpperCase();document.getElementById('rearned').textContent=earned;document.getElementById('rscore').textContent=score+'/5 correct · Total: '+coins.toLocaleString()+' 🪙';show('results');upd();}
function goHome(){show('home');upd();}
function show(s){['home','quiz','results'].forEach(function(id){document.getElementById(id).classList[id===s?'remove':'add']('hidden');});}
async function getQ(){
  var key=localStorage.getItem('bc_key');
  if(!key){alert('Please save your API key first!');return null;}
  var p='Generate a '+diff+' trivia question about '+cat+'. Return ONLY valid JSON no markdown: {"question":"...","options":["A","B","C","D"],"correct":0}. correct is 0-based index of right answer.';
  try{var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:p}],max_tokens:300})});var d=await r.json();var t=d.choices[0].message.content.replace(/```json|```/g,'').trim();return JSON.parse(t);}
  catch(e){console.error(e);return null;}
}
checkKey();upd();
</script>
</body>
</html>
