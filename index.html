<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainCoins Simple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:sans-serif;padding:15px;text-align:center}
#app{max-width:400px;margin:0 auto}
h1{color:#00f5ff;margin-bottom:10px;font-size:22px}

.wallet-bar{display:flex;justify-content:center;gap:15px;margin-bottom:15px}
.coin-box{background:#1a1a2e;padding:5px 15px;border-radius:15px;border:1px solid gold;color:gold;font-weight:bold}

.card{background:rgba(255,255,255,0.05);padding:15px;border-radius:15px;margin-bottom:15px;border:1px solid #333}

/* BUTTONS */
button{width:100%;padding:12px;border-radius:10px;border:none;font-weight:bold;cursor:pointer;margin-bottom:8px}
.btn-play{background:linear-gradient(to right, #7c3aed, #0891b2);color:#fff}
.btn-gift{background:#ff00cc;color:white;font-size:12px;display:none}

/* SELECTIONS */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:15px}
.item{padding:10px 2px;background:#111;border:1px solid #333;border-radius:8px;font-size:10px;cursor:pointer}
.item.on{border-color:#00f5ff;background:#003344;color:#00f5ff}

/* QUIZ */
.opt{background:#1a1a2e;color:#fff;text-align:left;border:1px solid #333;padding:12px;margin-bottom:8px;width:100%;border-radius:8px}
.opt.correct{background:#052e16;border-color:#4ade80;color:#4ade80}
.opt.wrong{background:#2d0a0a;border-color:#f87171;color:#f87171}

.timer-bg{width:100%;height:6px;background:#222;border-radius:10px;margin-bottom:10px;overflow:hidden}
.timer-fill{height:100%;background:#00f5ff;width:100%;transition:width 1s linear}

.hidden{display:none}
</style>
</head>
<body>

<div id="app">
    <h1>BRAINCOINS</h1>
    
    <div class="wallet-bar">
        <div class="coin-box">🪙 <span id="c-val">0</span></div>
        <div class="coin-box" style="border-color:#00f5ff; color:#00f5ff">💎 <span id="g-val">0</span></div>
    </div>

    <button id="giftBtn" class="btn-gift" onclick="claim()">🎁 CLAIM DAILY 50 COINS</button>

    <div id="home">
        <div class="card">
            <p style="font-size:12px;color:#888;margin-bottom:10px">CHOOSE TOPIC</p>
            <div class="grid">
                <div class="item" onclick="setCat(this,17)">Science</div>
                <div class="item" onclick="setCat(this,23)">History</div>
                <div class="item" onclick="setCat(this,11)">Pop</div>
                <div class="item" onclick="setCat(this,22)">Geography</div>
                <div class="item" onclick="setCat(this,21)">Sports</div>
                <div class="item" onclick="setCat(this,18)">Tech</div>
            </div>
            <p style="font-size:12px;color:#888;margin-bottom:10px">DIFFICULTY</p>
            <div class="grid">
                <div class="item" onclick="setDiff(this,'easy')">EASY</div>
                <div class="item" onclick="setDiff(this,'medium')">MED</div>
                <div class="item" onclick="setDiff(this,'hard')">HARD</div>
            </div>
            <button class="btn-play" id="sBtn" onclick="startGame()" disabled>START GAME</button>
        </div>
    </div>

    <div id="quiz" class="hidden">
        <div class="timer-bg"><div class="timer-fill" id="t-fill"></div></div>
        <div class="card"><p id="q-txt" style="font-size:16px"></p></div>
        <div id="opts"></div>
    </div>

    <div id="results" class="hidden">
        <div class="card">
            <h2 id="res-title">DONE!</h2>
            <p id="res-sub"></p>
            <h1 style="font-size:40px;margin:10px 0">🪙 <span id="res-coins">0</span></h1>
            <p id="gem-msg" style="color:#00f5ff;font-weight:bold" class="hidden">💎 +1 GEM AWARDED!</p>
        </div>
        <button class="btn-play" onclick="startGame()">PLAY AGAIN</button>
        <button onclick="location.reload()" style="background:#333;color:#fff">BACK TO HOME</button>
    </div>
</div>

<script>
let coins = +localStorage.getItem('bc_c')||0, gems = +localStorage.getItem('bc_g')||0;
let selCat = null, selDiff = null, curQ = 0, score = 0, earned = 0, qData = null, isDone = false, timer = 20, timerInt = null;

function upd() {
    document.getElementById('c-val').textContent = coins;
    document.getElementById('g-val').textContent = gems;
    const last = localStorage.getItem('bc_last');
    if(!last || new Date().getTime() - last > 86400000) document.getElementById('giftBtn').style.display='block';
    else document.getElementById('giftBtn').style.display='none';
}

function claim(){ coins+=50; localStorage.setItem('bc_last', new Date().getTime()); save(); upd(); }
function save(){ localStorage.setItem('bc_c', coins); localStorage.setItem('bc_g', gems); }

function setCat(el,id){ document.querySelectorAll('.item').forEach(i=>i.classList.remove('on')); el.classList.add('on'); selCat=id; check(); }
function setDiff(el,d){ el.parentElement.querySelectorAll('.item').forEach(i=>i.classList.remove('on')); el.classList.add('on'); selDiff=d; check(); }
function check(){ if(selCat && selDiff){ let b=document.getElementById('sBtn'); b.disabled=false; b.style.opacity=1; } }

async function startGame(){
    score=0; earned=0; curQ=0; 
    document.getElementById('home').classList.add('hidden');
    document.getElementById('results').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    await nextQ();
}

async function nextQ(){
    isDone = false; clearInterval(timerInt);
    document.getElementById('opts').innerHTML = "<p style='color:#666'>Loading...</p>";
    try {
        const r = await fetch(`https://opentdb.com/api.php?amount=1&category=${selCat}&difficulty=${selDiff}&type=multiple`);
        const d = await r.json();
        const res = d.results[0];
        const options = [...res.incorrect_answers];
        const corIdx = Math.floor(Math.random()*4);
        options.splice(corIdx, 0, res.correct_answer);
        qData = { q: res.question, options: options, correct: corIdx };
        
        document.getElementById('q-txt').innerHTML = qData.q;
        document.getElementById('opts').innerHTML = "";
        qData.options.forEach((o, i) => {
            let b = document.createElement('button');
            b.className = 'opt';
            b.innerHTML = o;
            b.onclick = () => answer(i, b);
            document.getElementById('opts').appendChild(b);
        });
        startT();
    } catch(e) { alert("Error loading question."); location.reload(); }
}

function startT(){
    timer = 20;
    timerInt = setInterval(()=>{
        timer--;
        document.getElementById('t-fill').style.width = (timer/20)*100 + "%";
        if(timer <= 0){ clearInterval(timerInt); answer(-1, null); }
    }, 1000);
}

function answer(idx, btn){
    if(isDone) return; isDone = true; clearInterval(timerInt);
    const btns = document.querySelectorAll('.opt');
    if(idx === qData.correct){
        btn.classList.add('correct');
        let win = {easy:10,medium:20,hard:30}[selDiff];
        score++; earned += win; coins += win;
    } else {
        if(btn) btn.classList.add('wrong');
        btns[qData.correct].classList.add('correct');
    }
    save(); upd();
    setTimeout(()=>{
        curQ++;
        if(curQ < 5) nextQ();
        else finish();
    }, 1500);
}

function finish(){
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('res-coins').textContent = earned;
    if(score === 5){ gems++; document.getElementById('gem-msg').classList.remove('hidden'); }
    else document.getElementById('gem-msg').classList.add('hidden');
    save(); upd();
}

upd();
</script>
</body>
</html>
